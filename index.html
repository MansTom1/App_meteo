<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Météo</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="container">
    <h1>Météo</h1>
    <div class="search">
      <input type="text" id="city-input" placeholder="Ex : Paris, Lyon, Tokyo">
      <button id="search-btn">Rechercher</button>
    </div>
    <!-- Contenu injecté par script.js ; "hidden" le masque tant qu'il est vide -->
    <div id="weather-result" class="hidden"></div>
    <p id="error-message" class="error hidden"></p>
  </main>
  <!-- config.js avant script.js : getWeather() doit exister avant le clic -->
  <script src="config.js"></script>
  <script src="script.js"></script>
</body>
</html>
